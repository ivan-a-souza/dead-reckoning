<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DR Smart Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .glass { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        .console-mini { font-family: monospace; font-size: 10px; color: #4ade80; max-height: 60px; overflow-y: hidden; }
        /* Animação de pulso para detecção de passo */
        .step-pulse { animation: pulse 0.3s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); border-color: #3b82f6; } 50% { transform: scale(1.05); border-color: #60a5fa; } 100% { transform: scale(1); border-color: rgba(255,255,255,0.1); } }
    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- Header: Stats -->
        <div class="p-4 flex justify-between items-start">
            <div class="glass p-3 rounded-2xl interactive w-32 shadow-2xl">
                <p class="text-[9px] opacity-50 font-bold uppercase tracking-widest">Distância</p>
                <h1 id="dist-val" class="text-xl font-black text-blue-400">0.00m</h1>
                <div id="gps-status" class="text-[8px] text-gray-500 mt-1 italic">GPS Off</div>
            </div>
            
            <div class="glass p-3 rounded-2xl interactive w-32 text-right shadow-2xl">
                <p class="text-[9px] opacity-50 font-bold uppercase tracking-widest">Bússola</p>
                <h1 id="hd-val" class="text-xl font-black">0°</h1>
                <div id="acc-val" class="text-[8px] text-gray-500 mt-1 font-mono">Acc: 0.0</div>
            </div>
        </div>

        <!-- Middle: Feedback de Log (Discreto) -->
        <div class="px-4 pointer-events-none">
            <div id="log-window" class="console-mini bg-black/40 p-2 rounded-lg border border-white/5 opacity-60">
                > Sistema carregado. Aguardando ativação.
            </div>
        </div>

        <!-- Footer: Controls -->
        <div class="p-4 pb-8 interactive">
            <div id="panel-setup" class="glass p-6 rounded-[2rem] shadow-2xl">
                <button id="btn-init" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-lg active:scale-95">
                    Ativar Sensores
                </button>
            </div>

            <div id="panel-active" class="hidden glass p-5 rounded-[2rem] shadow-2xl space-y-4">
                <!-- Status do Passo Criado pelo "ML" -->
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10" id="step-card">
                    <div>
                        <span class="text-[10px] text-blue-400 font-bold uppercase">Passos</span>
                        <div id="step-count" class="text-2xl font-black">0</div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-gray-400 font-bold uppercase">Passo Estimado</span>
                        <div id="step-len-display" class="text-lg font-bold">0.75m</div>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-train-gps" class="bg-yellow-600/20 text-yellow-500 border border-yellow-600/30 py-4 rounded-2xl font-bold text-xs uppercase flex flex-col items-center justify-center gap-1">
                        <span>🛰️ Treinar GPS</span>
                        <span class="text-[8px] opacity-60">(Caminhe 20 passos)</span>
                    </button>
                    <button id="btn-run" disabled class="bg-gray-800 text-gray-500 py-4 rounded-2xl font-bold text-xs uppercase opacity-50">
                        🚀 Iniciar Rastreio
                    </button>
                </div>

                <div class="flex gap-2">
                    <button id="btn-simulate" class="flex-1 bg-white/5 text-gray-400 py-2 rounded-xl text-[10px] border border-white/5 uppercase">Simular Passo</button>
                    <button id="btn-reset" class="px-4 py-2 bg-red-900/20 text-red-500 border border-red-900/30 rounded-xl text-[10px] uppercase font-bold">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO ---
        let state = {
            mode: 'IDLE', // IDLE, TRAINING, RUNNING
            stepLength: 0.75,
            steps: 0,
            distance: 0,
            heading: 0,
            pos: { x: 0, z: 0 },
            path: [new THREE.Vector3(0, 0, 0)],
            lastStepTime: 0,
            // Lógica de "ML" / Adaptativa
            threshold: 13.0,
            accHistory: [],
            // GPS Training
            gpsPoints: [],
            gpsStartPos: null
        };

        const logWindow = document.getElementById('log-window');
        function addLog(msg) {
            const line = document.createElement('div');
            line.innerHTML = `> ${msg}`;
            logWindow.prepend(line);
        }

        // --- MOTOR 3D (THREE.JS) ---
        let scene, camera, renderer, player, trail;

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Grid e Iluminação
            const grid = new THREE.GridHelper(500, 100, 0x111122, 0x0a0a10);
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Marcador do Usuário
            player = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1d4ed8, emissiveIntensity: 0.5 })
            );
            const arrow = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.8),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            arrow.position.z = -0.6;
            player.add(body, arrow);
            player.position.y = 0.5;
            scene.add(player);

            // Rastro
            const lineMat = new THREE.LineBasicMaterial({ color: 0x60a5fa, linewidth: 3 });
            trail = new THREE.Line(new THREE.BufferGeometry().setFromPoints(state.path), lineMat);
            scene.add(trail);

            camera.position.set(0, 20, 15);
            camera.lookAt(0, 0, 0);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // Suavizar câmera seguindo o player
            camera.position.x += (player.position.x - camera.position.x) * 0.05;
            camera.position.z += ((player.position.z + 15) - camera.position.z) * 0.05;
            camera.lookAt(player.position.x, 0, player.position.z);
            renderer.render(scene, camera);
        }

        function move(dist) {
            const rad = state.heading * (Math.PI / 180);
            state.pos.x += Math.sin(rad) * dist;
            state.pos.z += -Math.cos(rad) * dist;

            player.position.set(state.pos.x, 0.5, state.pos.z);
            player.rotation.y = -rad; // Alinha seta com bússola

            state.path.push(new THREE.Vector3(state.pos.x, 0, state.pos.z));
            trail.geometry.setFromPoints(state.path);

            if (state.mode === 'RUNNING') {
                state.distance += dist;
                document.getElementById('dist-val').textContent = state.distance.toFixed(2) + "m";
            }
            
            // UI Feedback
            const card = document.getElementById('step-card');
            card.classList.add('step-pulse');
            setTimeout(() => card.classList.remove('step-pulse'), 300);
        }

        // --- GPS DISTANCE (HAVERSINE) ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Metros
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- SENSORES ---
        async function startSensors() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res !== 'granted') return alert("Permissão negada");
            }

            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity || e.acceleration;
                if (!acc) return;
                const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                document.getElementById('acc-val').textContent = `Acc: ${mag.toFixed(1)}`;

                // "Machine Learning" Simulado: Ajuste Dinâmico de Threshold
                state.accHistory.push(mag);
                if(state.accHistory.length > 50) state.accHistory.shift();
                
                // O threshold se adapta ao ruído ambiente (média dos picos)
                const avgAcc = state.accHistory.reduce((a,b)=>a+b,0) / state.accHistory.length;
                const dynamicThreshold = avgAcc + 3.0; 

                const now = Date.now();
                if (mag > dynamicThreshold && (now - state.lastStepTime > 350)) {
                    if (state.mode !== 'IDLE') {
                        state.steps++;
                        document.getElementById('step-count').textContent = state.steps;
                        move(state.stepLength);
                        state.lastStepTime = now;
                    }
                }
            });

            window.addEventListener('deviceorientation', (e) => {
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h !== undefined) {
                    state.heading = h;
                    document.getElementById('hd-val').textContent = Math.round(h) + "°";
                }
            });

            document.getElementById('btn-init').parentElement.classList.add('hidden');
            document.getElementById('panel-active').classList.remove('hidden');
            addLog("Sensores ativos. Pronto para treino.");
        }

        // --- TREINAMENTO GPS ---
        function startGpsTraining() {
            state.mode = 'TRAINING';
            state.steps = 0;
            state.gpsPoints = [];
            addLog("Treino GPS iniciado. Caminhe 20 passos.");
            document.getElementById('gps-status').textContent = "GPS Training...";
            document.getElementById('gps-status').className = "text-[8px] text-yellow-500 mt-1 animate-pulse font-bold";

            const geoOptions = { enableHighAccuracy: true };
            const watchId = navigator.geolocation.watchPosition((pos) => {
                state.gpsPoints.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                if (state.gpsPoints.length > 1) {
                    const first = state.gpsPoints[0];
                    const last = state.gpsPoints[state.gpsPoints.length - 1];
                    const totalDistGps = getDistance(first.lat, first.lon, last.lat, last.lon);
                    
                    if (state.steps > 5) {
                        state.stepLength = totalDistGps / state.steps;
                        document.getElementById('step-len-display').textContent = state.stepLength.toFixed(2) + "m";
                    }
                }
            }, null, geoOptions);

            // Para o treino automaticamente após 25 passos para "estabilizar"
            const checkEnd = setInterval(() => {
                if (state.steps >= 25) {
                    navigator.geolocation.clearWatch(watchId);
                    clearInterval(checkEnd);
                    finishTraining();
                }
            }, 1000);
        }

        function finishTraining() {
            state.mode = 'IDLE';
            addLog(`Treino concluído! Passo: ${state.stepLength.toFixed(2)}m`);
            document.getElementById('gps-status').textContent = "Calibrado (GPS Off)";
            document.getElementById('gps-status').className = "text-[8px] text-green-500 mt-1 font-bold";
            document.getElementById('btn-run').disabled = false;
            document.getElementById('btn-run').classList.remove('opacity-50', 'bg-gray-800');
            document.getElementById('btn-run').classList.add('bg-green-600', 'text-white');
        }

        // --- EVENTOS ---
        document.getElementById('btn-init').onclick = () => { init3D(); startSensors(); };
        document.getElementById('btn-train-gps').onclick = startGpsTraining;
        
        document.getElementById('btn-run').onclick = () => {
            const btn = document.getElementById('btn-run');
            if (state.mode === 'RUNNING') {
                state.mode = 'IDLE';
                btn.textContent = "Continuar";
                btn.classList.replace('bg-red-600', 'bg-green-600');
            } else {
                state.mode = 'RUNNING';
                btn.textContent = "Pausar";
                btn.classList.replace('bg-green-600', 'bg-red-600');
            }
        };

        document.getElementById('btn-simulate').onclick = () => move(state.stepLength);
        document.getElementById('btn-reset').onclick = () => location.reload();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
