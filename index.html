<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inertial AI Navigator Pro</title>
    <!-- Atualizado para r146 para suportar CapsuleGeometry -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r146/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'JetBrains Mono', monospace; color: #e2e8f0; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .glass { background: rgba(10, 10, 18, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        #console-log { font-size: 9px; color: #60a5fa; max-height: 80px; overflow-y: auto; scroll-behavior: smooth; border-radius: 8px; }
        .step-hit { animation: step-hit 0.3s ease-out; }
        @keyframes step-hit { 0% { background: #3b82f6; } 100% { background: transparent; } }
        /* Garantir que nada se sobreponha no mobile */
        .bottom-sheet { max-height: 40vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- Dashboard Superior: Telemetria e Sensores -->
        <div class="p-4 flex flex-col sm:flex-row justify-between items-start gap-2">
            <div class="glass p-4 rounded-2xl interactive w-full sm:w-44 shadow-2xl">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] text-blue-400 font-bold uppercase">Distância</span>
                    <span id="sys-status" class="text-[8px] px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 font-bold">IDLE</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="dist-val" class="text-3xl font-black tracking-tighter">0.00</span>
                    <span class="text-xs opacity-50 font-bold">m</span>
                </div>
                <div class="mt-2 grid grid-cols-2 gap-2 text-[9px] opacity-70">
                    <div>Passos: <span id="stat-steps" class="text-white font-bold">0</span></div>
                    <div>Velo: <span id="stat-speed" class="text-white font-bold">0.0</span></div>
                </div>
            </div>

            <div class="glass p-3 rounded-2xl interactive w-full sm:w-52 shadow-2xl text-[9px] space-y-1">
                <p class="text-emerald-400 font-bold uppercase mb-2 flex items-center">
                    <span class="status-dot dot-green"></span> Sensores Live
                </p>
                <div class="flex justify-between">
                    <span class="opacity-50">Acc (Raw):</span> <span id="raw-acc" class="font-mono">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span class="opacity-50">Acc (Filt):</span> <span id="filt-acc" class="text-emerald-400 font-mono">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span class="opacity-50">Bússola:</span> <span id="raw-hd" class="font-mono">0°</span>
                </div>
                <div class="flex justify-between border-t border-white/5 pt-1 mt-1">
                    <span class="opacity-50 text-blue-300">IA Modelo:</span> <span id="ml-status" class="text-blue-300 italic">Inicializando...</span>
                </div>
            </div>
        </div>

        <div class="flex-grow"></div>

        <!-- Rodapé: Controles e Logs -->
        <div class="p-4 pb-6 flex flex-col gap-3 interactive">
            <div id="console-log" class="glass p-3 mx-auto w-full max-w-lg bg-black/60 border-blue-500/20 shadow-inner">
                > Sistema carregado. Clique em 'Inicializar'.
            </div>

            <div class="glass p-6 rounded-[2.5rem] shadow-2xl max-w-lg mx-auto w-full bottom-sheet">
                <div id="setup-area">
                    <div class="text-center mb-6">
                        <h2 class="font-black text-xl tracking-tighter uppercase">AI Inertial Navigator</h2>
                        <p class="text-[10px] opacity-40 uppercase mt-1">Navegação Indoor de Alta Precisão</p>
                    </div>
                    <button id="btn-init" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-blue-600/30">
                        Inicializar Sistema
                    </button>
                </div>

                <div id="active-area" class="hidden space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-train" class="bg-yellow-600/10 text-yellow-500 border border-yellow-600/30 py-4 rounded-2xl font-bold text-[11px] uppercase flex flex-col items-center justify-center text-center">
                            <span>🛰️ Calibrar IA</span>
                            <span class="text-[8px] opacity-60">(15s de caminhada)</span>
                        </button>
                        <button id="btn-run" disabled class="bg-slate-800 text-slate-500 py-4 rounded-2xl font-bold text-[11px] uppercase cursor-not-allowed">
                            🚀 Iniciar Rastreio
                        </button>
                    </div>

                    <div class="flex gap-2 border-t border-white/10 pt-4">
                        <button id="btn-clear" class="flex-1 py-3 text-[10px] font-bold uppercase text-blue-400 bg-blue-400/10 rounded-xl hover:bg-blue-400/20 transition-all">Limpar Trajeto</button>
                        <button id="btn-reset" class="px-4 py-3 text-[10px] font-bold uppercase text-red-500 bg-red-500/10 rounded-xl hover:bg-red-500/20">Reiniciar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MACHINE LEARNING: REGRESSÃO LINEAR DE PASSO ---
        class MLStepModel {
            constructor() {
                this.bias = 0.72; 
                this.intensityWeight = 0.04; 
                this.cadenceWeight = 0.02;
                this.isCalibrated = false;
            }

            predict(variance, cadence) {
                return this.bias + (variance * this.intensityWeight) + (cadence * this.cadenceWeight);
            }

            train(gpsDistance, steps, avgVariance, avgCadence) {
                if (steps < 4) return;
                const actualLen = gpsDistance / steps;
                const predicted = this.predict(avgVariance, avgCadence);
                
                // Ajuste de peso (Delta Rule)
                const error = actualLen - predicted;
                this.bias += error * 0.3; // Taxa de aprendizado
                this.isCalibrated = true;
                
                document.getElementById('ml-status').textContent = "IA Otimizada";
                document.getElementById('ml-status').className = "text-emerald-400 font-bold";
            }
        }

        // --- DSP: FILTRO DE RUÍDO ---
        class SignalFilter {
            constructor(size = 8) {
                this.history = [];
                this.size = size;
            }
            process(val) {
                this.history.push(val);
                if (this.history.length > this.size) this.history.shift();
                return this.history.reduce((a, b) => a + b, 0) / this.history.length;
            }
        }

        // --- ESTADO ---
        const state = {
            mode: 'IDLE',
            steps: 0,
            distance: 0,
            heading: 0,
            lastStepTime: Date.now(),
            pos: { x: 0, z: 0 },
            pathPoints: [new THREE.Vector3(0, 0, 0)],
            filter: new SignalFilter(10),
            ml: new MLStepModel(),
            // Treino
            trainSteps: 0,
            trainVariances: [],
            trainGPSStart: null
        };

        const consoleLog = document.getElementById('console-log');
        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.style.color = type === 'error' ? '#ef4444' : (type === 'success' ? '#4ade80' : '#60a5fa');
            line.innerHTML = `> ${msg}`;
            consoleLog.appendChild(line);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        // --- THREE.JS: TERCEIRA PESSOA ---
        let scene, camera, renderer, player, trail;
        const CAM_DIST = 14;
        const CAM_HEIGHT = 9;

        function init3D() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020205);
                scene.fog = new THREE.Fog(0x020205, 15, 65);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(renderer.domElement);

                // Grid Cibernético
                const grid = new THREE.GridHelper(1000, 100, 0x1e1e2e, 0x11111b);
                scene.add(grid);

                // Avatar (Usando CapsuleGeometry agora seguro na r146)
                player = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.4, 1.2, 4, 16),
                    new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x3b82f6, emissiveIntensity: 0.4 })
                );
                const eye = new THREE.Mesh(
                    new THREE.BoxGeometry(0.6, 0.15, 0.2),
                    new THREE.MeshBasicMaterial({ color: 0x60a5fa })
                );
                eye.position.set(0, 0.7, -0.4);
                player.add(body, eye);
                player.position.y = 1;
                scene.add(player);

                // Luzes
                const pLight = new THREE.PointLight(0x3b82f6, 5, 25);
                pLight.position.set(0, 4, 0);
                player.add(pLight);
                scene.add(new THREE.AmbientLight(0xffffff, 0.5));

                // Trajeto
                trail = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(state.pathPoints),
                    new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 })
                );
                scene.add(trail);

                addLog("Three.js r146 Iniciado.", "success");
                animate();
            } catch (e) {
                addLog("Falha Three.js: " + e.message, "error");
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (player) {
                // Suavização da câmera em 3ª pessoa
                const angle = player.rotation.y;
                const targetX = player.position.x + Math.sin(angle) * CAM_DIST;
                const targetZ = player.position.z + Math.cos(angle) * CAM_DIST;
                
                const targetPos = new THREE.Vector3(targetX, player.position.y + CAM_HEIGHT, targetZ);
                camera.position.lerp(targetPos, 0.08);
                camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            }
            renderer.render(scene, camera);
        }

        function detectStep(variance) {
            const now = Date.now();
            const cadence = 1000 / (now - state.lastStepTime || 1000);
            
            // IA estima comprimento baseado na energia do passo
            const stepLen = state.ml.predict(variance, cadence);
            
            const rad = state.heading * (Math.PI / 180);
            state.pos.x += Math.sin(rad) * stepLen;
            state.pos.z += -Math.cos(rad) * stepLen;

            // Atualização visual
            player.position.set(state.pos.x, 1, state.pos.z);
            player.rotation.y = -rad;

            state.pathPoints.push(new THREE.Vector3(state.pos.x, 0, state.pos.z));
            trail.geometry.setFromPoints(state.pathPoints);

            if (state.mode === 'RUNNING') {
                state.distance += stepLen;
                document.getElementById('dist-val').textContent = state.distance.toFixed(2);
            } else if (state.mode === 'TRAINING') {
                state.trainSteps++;
                state.trainVariances.push(variance);
            }

            state.steps++;
            document.getElementById('stat-steps').textContent = state.steps;
            state.lastStepTime = now;
            
            document.body.classList.add('step-hit');
            setTimeout(() => document.body.classList.remove('step-hit'), 250);
        }

        async function startSensors() {
            addLog("Solicitando sensores...");
            try {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const res = await DeviceMotionEvent.requestPermission();
                    if (res !== 'granted') throw new Error("Permissão de movimento negada.");
                }

                window.addEventListener('devicemotion', (e) => {
                    const acc = e.accelerationIncludingGravity || {x:0,y:0,z:0};
                    if (acc.x === null) return;
                    
                    const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                    const filtered = state.filter.process(mag);

                    document.getElementById('raw-acc').textContent = mag.toFixed(2);
                    document.getElementById('filt-acc').textContent = filtered.toFixed(2);

                    const now = Date.now();
                    // Threshold adaptativo (ML-Inspired)
                    if (filtered > 13.2 && (now - state.lastStepTime > 330)) {
                        if (state.mode !== 'IDLE') detectStep(filtered - 9.8);
                    }
                });

                window.addEventListener('deviceorientation', (e) => {
                    let h = e.webkitCompassHeading || (360 - e.alpha);
                    if (h !== undefined) {
                        state.heading = h;
                        document.getElementById('raw-hd').textContent = Math.round(h) + "°";
                    }
                });

                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('active-area').classList.remove('hidden');
                document.getElementById('ml-status').textContent = "Modelo Estático";
                addLog("Navegação Inercial Pronta.", "success");
            } catch (err) {
                addLog(err.message, "error");
            }
        }

        function runGpsCalibration() {
            state.mode = 'TRAINING';
            state.trainSteps = 0;
            state.trainVariances = [];
            document.getElementById('sys-status').textContent = "CALIB";
            addLog("Sincronizando GPS...");

            navigator.geolocation.getCurrentPosition((pos) => {
                state.trainGPSStart = pos.coords;
                addLog("GPS OK. Caminhe em linha reta por 15s.");
                
                setTimeout(() => {
                    navigator.geolocation.getCurrentPosition((end) => {
                        const dist = calculateDistance(state.trainGPSStart, end.coords);
                        const avgVar = state.trainVariances.reduce((a,b)=>a+b,0) / (state.trainVariances.length || 1);
                        
                        state.ml.train(dist, state.trainSteps, avgVar, 1.8);
                        
                        state.mode = 'IDLE';
                        document.getElementById('sys-status').textContent = "IDLE";
                        addLog(`IA Calibrada! Passo base: ${state.ml.bias.toFixed(2)}m`, "success");
                        
                        const btn = document.getElementById('btn-run');
                        btn.disabled = false;
                        btn.className = "bg-emerald-600 text-white py-4 rounded-2xl font-bold text-[11px] uppercase shadow-lg";
                    }, null, {enableHighAccuracy: true});
                }, 15000);
            }, (err) => addLog("Erro GPS: " + err.message, "error"), {enableHighAccuracy: true});
        }

        function calculateDistance(c1, c2) {
            const R = 6371e3;
            const dLat = (c2.latitude - c1.latitude) * Math.PI / 180;
            const dLon = (c2.longitude - c1.longitude) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(c1.latitude*Math.PI/180)*Math.cos(c2.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        document.getElementById('btn-init').onclick = () => { init3D(); startSensors(); };
        document.getElementById('btn-train').onclick = runGpsCalibration;
        
        document.getElementById('btn-run').onclick = () => {
            const btn = document.getElementById('btn-run');
            if (state.mode === 'RUNNING') {
                state.mode = 'IDLE';
                btn.textContent = "Retomar";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
                document.getElementById('sys-status').textContent = "PAUSE";
            } else {
                state.mode = 'RUNNING';
                btn.textContent = "Pausar";
                btn.classList.replace('bg-emerald-600', 'bg-red-600');
                document.getElementById('sys-status').textContent = "ACTIVE";
            }
        };

        document.getElementById('btn-clear').onclick = () => {
            state.pathPoints = [new THREE.Vector3(player.position.x, 0, player.position.z)];
            trail.geometry.setFromPoints(state.pathPoints);
            addLog("Trajeto visual limpo.");
        };

        document.getElementById('btn-reset').onclick = () => location.reload();

        window.onresize = () => {
            if (renderer && camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>
