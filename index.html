<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navegação Estimada 3D</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0b; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 50; display: flex; flex-direction: column; justify-content:空间-between; padding: 1rem; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        #log-window { font-family: monospace; font-size: 10px; height: 80px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; pointer-events: auto; }
        .step-pulse { animation: pulse 0.4s ease-out; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- Topo: Stats -->
        <div class="glass p-4 flex justify-between items-center shadow-xl interactive">
            <div>
                <p class="text-[10px] opacity-50 uppercase font-bold tracking-wider">Distância</p>
                <h1 id="dist-val" class="text-2xl font-black text-blue-400">0.00m</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase font-bold tracking-wider">Direção</p>
                <h1 id="hd-val" class="text-2xl font-black text-white">0°</h1>
            </div>
        </div>

        <!-- Centro: Logs de Depuração -->
        <div class="flex flex-col gap-2">
            <div id="log-window" class="text-green-400">
                > Sistema pronto. Aguardando interação...
            </div>
        </div>

        <!-- Fundo: Controlos -->
        <div class="glass p-6 shadow-2xl space-y-4 interactive mb-4">
            <!-- Ecrã de Inicialização -->
            <div id="init-ui" class="space-y-4">
                <h2 class="text-center font-bold">Acesso aos Sensores</h2>
                <p class="text-[11px] text-gray-400 text-center">Para rastrear movimento sem GPS, precisamos de aceder ao acelerómetro e à bússola.</p>
                <button id="btn-perms" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-900/40">
                    ATIVAR SENSORES
                </button>
            </div>

            <!-- Ecrã de Modos -->
            <div id="main-ui" class="hidden space-y-4">
                <!-- Treino -->
                <div id="training-box" class="space-y-2">
                    <p class="text-[10px] text-yellow-500 font-bold uppercase">Calibração</p>
                    <div class="flex gap-2">
                        <button id="btn-train-start" class="flex-1 bg-yellow-600/20 text-yellow-500 border border-yellow-600/40 py-3 rounded-lg text-sm font-bold">Iniciar Treino</button>
                        <button id="btn-train-stop" disabled class="flex-1 bg-gray-800 text-gray-500 py-3 rounded-lg text-sm font-bold opacity-30">Parar (10m)</button>
                    </div>
                </div>

                <!-- Execução -->
                <div id="execution-box" class="hidden space-y-2 border-t border-white/10 pt-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold">Rastreio Ativo</span>
                        <span id="step-info" class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded">Passo: 0.75m</span>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-run-toggle" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-black text-sm uppercase">Começar</button>
                        <button id="btn-reset" class="bg-red-950/40 text-red-500 px-4 py-4 rounded-xl border border-red-900/50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                        </button>
                    </div>
                </div>
                
                <!-- Botão de Emergência para PC -->
                <button id="btn-manual" class="w-full py-2 text-[9px] text-gray-500 border border-dashed border-gray-700 rounded mt-2">FORÇAR PASSO (SIMULAÇÃO)</button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        const state = {
            mode: 'IDLE', // IDLE, TRAINING, RUNNING
            stepLength: 0.75,
            steps: 0,
            distance: 0,
            heading: 0,
            lastStepTime: 0,
            path: [new THREE.Vector3(0, 0, 0)],
            pos: { x: 0, z: 0 }
        };

        // --- LOGGER ---
        const logger = document.getElementById('log-window');
        function log(msg, color = "#4ade80") {
            const div = document.createElement('div');
            div.style.color = color;
            div.textContent = `> ${msg}`;
            logger.appendChild(div);
            logger.scrollTop = logger.scrollHeight;
        }

        // --- MOTOR 3D ---
        let scene, camera, renderer, marker, trail;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050507);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Grade e Luz
            const grid = new THREE.GridHelper(200, 50, 0x222222, 0x111111);
            scene.add(grid);
            
            // Marcador de posição
            marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xff3333 })
            );
            marker.position.y = 0.4;
            scene.add(marker);

            // Linha de Trajeto
            const lineMat = new THREE.LineBasicMaterial({ color: 0x3b82f6, linewidth: 2 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints(state.path);
            trail = new THREE.Line(lineGeo, lineMat);
            scene.add(trail);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // --- LÓGICA DE MOVIMENTO ---
        function registerStep(distance) {
            // Converter Heading da bússola para coordenadas 3D (Z negativo é "frente")
            const rad = state.heading * (Math.PI / 180);
            const dx = Math.sin(rad) * distance;
            const dz = -Math.cos(rad) * distance;

            state.pos.x += dx;
            state.pos.z += dz;

            // Atualizar 3D
            marker.position.set(state.pos.x, 0.4, state.pos.z);
            state.path.push(new THREE.Vector3(state.pos.x, 0, state.pos.z));
            trail.geometry.setFromPoints(state.path);

            // Câmara segue
            camera.position.x = state.pos.x;
            camera.position.z = state.pos.z + 15;
            camera.lookAt(state.pos.x, 0, state.pos.z);

            // Atualizar UI
            if (state.mode === 'RUNNING') {
                state.distance += distance;
                document.getElementById('dist-val').textContent = state.distance.toFixed(2) + "m";
            }
            
            // Feedback Visual
            document.getElementById('dist-val').parentElement.classList.add('step-pulse');
            setTimeout(() => document.getElementById('dist-val').parentElement.classList.remove('step-pulse'), 400);
        }

        // --- SENSORES ---
        async function initSensors() {
            log("Iniciando sensores...");
            
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const motion = await DeviceMotionEvent.requestPermission();
                    const orient = await DeviceOrientationEvent.requestPermission();
                    if (motion !== 'granted') throw new Error("Permissão de movimento negada");
                    log("Sensores iOS OK", "#3b82f6");
                } catch(e) {
                    log("Erro: " + e.message, "#f87171");
                    return;
                }
            }

            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity || e.acceleration;
                if (!acc) return;
                
                const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                
                // Algoritmo simples de Step Detection
                const now = Date.now();
                if (magnitude > 13.8 && (now - state.lastStepTime > 300)) {
                    if (state.mode !== 'IDLE') {
                        state.steps++;
                        registerStep(state.stepLength);
                        state.lastStepTime = now;
                        log(`Passo #${state.steps} detetado`);
                    }
                }
            }, true);

            window.addEventListener('deviceorientation', (e) => {
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h !== undefined) {
                    state.heading = h;
                    document.getElementById('hd-val').textContent = Math.round(h) + "°";
                }
            }, true);

            document.getElementById('init-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            log("Rastreio pronto. Inicie o Treino.");
        }

        // --- BOTÕES E EVENTOS ---
        document.getElementById('btn-perms').onclick = () => {
            initScene();
            initSensors();
        };

        document.getElementById('btn-train-start').onclick = () => {
            state.mode = 'TRAINING';
            state.steps = 0;
            log("TREINO: Caminhe exatamente 10 metros.", "#fbbf24");
            document.getElementById('btn-train-start').disabled = true;
            document.getElementById('btn-train-stop').disabled = false;
            document.getElementById('btn-train-stop').classList.remove('opacity-30', 'bg-gray-800');
            document.getElementById('btn-train-stop').classList.add('bg-green-600', 'text-white');
        };

        document.getElementById('btn-train-stop').onclick = () => {
            if (state.steps > 0) {
                state.stepLength = 10 / state.steps;
                log(`Calibrado! Comprimento do passo: ${state.stepLength.toFixed(2)}m`, "#3b82f6");
                document.getElementById('step-info').textContent = `Passo: ${state.stepLength.toFixed(2)}m`;
            }
            state.mode = 'IDLE';
            document.getElementById('training-box').classList.add('hidden');
            document.getElementById('execution-box').classList.remove('hidden');
        };

        document.getElementById('btn-run-toggle').onclick = () => {
            const btn = document.getElementById('btn-run-toggle');
            if (state.mode === 'RUNNING') {
                state.mode = 'IDLE';
                btn.textContent = "RETOMAR";
                btn.classList.replace('bg-red-600', 'bg-green-600');
                log("Pausado.");
            } else {
                state.mode = 'RUNNING';
                btn.textContent = "PAUSAR";
                btn.classList.replace('bg-green-600', 'bg-red-600');
                log("Rastreando movimento...");
            }
        };

        document.getElementById('btn-manual').onclick = () => {
            log("Simulação de passo manual");
            registerStep(state.stepLength);
        };

        document.getElementById('btn-reset').onclick = () => location.reload();

        window.onresize = () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };

    </script>
</body>
</html>
