<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dead Reckoning 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050507; color: #fff; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; padding: 1rem; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        #log-window { font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #333; }
        .active-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <!-- Dashboard Superior -->
        <div class="glass p-4 flex justify-between items-center interactive shadow-2xl mb-2">
            <div>
                <p class="text-[10px] opacity-50 uppercase font-bold">Distância</p>
                <h1 id="dist-val" class="text-2xl font-black text-blue-400">0.00m</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase font-bold">Ângulo</p>
                <h1 id="hd-val" class="text-2xl font-black text-white">0°</h1>
            </div>
        </div>

        <!-- Monitor de Sensores (Debug) -->
        <div id="log-window" class="interactive rounded-lg mb-2">
            <div class="text-blue-400 border-b border-blue-900/30 pb-1 mb-1 font-bold uppercase text-[9px]">Log de Sistema</div>
            <div id="log-content">Aguardando ativação...</div>
        </div>

        <div class="flex-grow"></div>

        <!-- Painel de Controle -->
        <div class="glass p-5 interactive shadow-2xl space-y-4">
            <div id="setup-view">
                <button id="btn-start-all" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-xl uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                    Iniciar Sistema
                </button>
                <p class="text-[10px] text-gray-500 text-center mt-3">Requer HTTPS e sensores de movimento ativos no navegador.</p>
            </div>

            <div id="control-view" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-train" class="bg-yellow-600/20 text-yellow-500 border border-yellow-600/30 py-3 rounded-lg font-bold text-xs uppercase">Treinar Passo</button>
                    <button id="btn-run" disabled class="bg-gray-800 text-gray-500 py-3 rounded-lg font-bold text-xs uppercase opacity-50">Rastrear</button>
                </div>
                
                <div class="flex gap-2">
                    <button id="btn-manual" class="flex-1 bg-white/5 text-gray-400 py-2 rounded-lg text-[10px] border border-white/10 uppercase">Simular Passo</button>
                    <button id="btn-reset" class="px-4 bg-red-900/20 text-red-500 border border-red-900/30 rounded-lg">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTES E ESTADO ---
        let state = {
            active: false,
            mode: 'IDLE', // IDLE, TRAINING, RUNNING
            stepLength: 0.75,
            steps: 0,
            distance: 0,
            heading: 0,
            lastStepTime: 0,
            pos: { x: 0, z: 0 },
            path: [new THREE.Vector3(0, 0, 0)]
        };

        const logContent = document.getElementById('log-content');
        function addLog(msg, color = "#fff") {
            const line = document.createElement('div');
            line.style.color = color;
            line.innerHTML = `<span style="opacity:0.3">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logContent.prepend(line);
        }

        // --- MOTOR 3D ---
        let scene, camera, renderer, player, trail;

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050507);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Luzes e Chão
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const grid = new THREE.GridHelper(200, 50, 0x222222, 0x111111);
            scene.add(grid);

            // Jogador
            player = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1d4ed8, emissiveIntensity: 0.5 })
            );
            player.position.y = 0.5;
            scene.add(player);

            // Rastro
            const lineMat = new THREE.LineBasicMaterial({ color: 0x60a5fa, linewidth: 2 });
            trail = new THREE.Line(new THREE.BufferGeometry().setFromPoints(state.path), lineMat);
            scene.add(trail);

            camera.position.set(0, 15, 12);
            camera.lookAt(0, 0, 0);

            animate();
            addLog("Motor 3D Iniciado", "#4ade80");
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function updatePosition(dist) {
            // No Three.js, -Z é para a frente. Bússola 0° = Norte.
            const rad = state.heading * (Math.PI / 180);
            const dx = Math.sin(rad) * dist;
            const dz = -Math.cos(rad) * dist;

            state.pos.x += dx;
            state.pos.z += dz;

            player.position.set(state.pos.x, 0.5, state.pos.z);
            state.path.push(new THREE.Vector3(state.pos.x, 0, state.pos.z));
            trail.geometry.setFromPoints(state.path);

            camera.position.x = state.pos.x;
            camera.position.z = state.pos.z + 15;
            camera.lookAt(state.pos.x, 0, state.pos.z);

            if (state.mode === 'RUNNING') {
                state.distance += dist;
                document.getElementById('dist-val').textContent = state.distance.toFixed(2) + "m";
            }
        }

        // --- SENSORES ---
        async function requestSensors() {
            addLog("Solicitando permissões...");

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    addLog("Status Motion: " + permission);
                    if (permission !== 'granted') throw new Error("Acesso negado");
                } catch (e) {
                    addLog("Erro iOS: " + e.message, "#f87171");
                    return false;
                }
            }

            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity || e.acceleration;
                if (!acc) return;
                
                const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                const now = Date.now();

                // Detecção de passo (Magnitude > 13.5 e intervalo > 300ms)
                if (mag > 13.5 && (now - state.lastStepTime > 300)) {
                    if (state.mode !== 'IDLE') {
                        state.steps++;
                        updatePosition(state.stepLength);
                        state.lastStepTime = now;
                        addLog(`Passo detectado! Total: ${state.steps}`, "#60a5fa");
                    }
                }
            }, true);

            window.addEventListener('deviceorientation', (e) => {
                // webkitCompassHeading para iOS, alpha para Android
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h !== undefined) {
                    state.heading = h;
                    document.getElementById('hd-val').textContent = Math.round(h) + "°";
                }
            }, true);

            return true;
        }

        // --- CONTROLES ---
        document.getElementById('btn-start-all').onclick = async () => {
            init3D();
            const success = await requestSensors();
            if (success) {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('control-view').classList.remove('hidden');
            }
        };

        document.getElementById('btn-train').onclick = () => {
            const btn = document.getElementById('btn-train');
            if (state.mode !== 'TRAINING') {
                state.mode = 'TRAINING';
                state.steps = 0;
                btn.textContent = "PARAR (ANDOU 10M?)";
                btn.classList.replace('bg-yellow-600/20', 'bg-yellow-600');
                btn.classList.replace('text-yellow-500', 'text-black');
                addLog("TREINO: Ande 10 metros em linha reta", "#fbbf24");
            } else {
                if (state.steps > 0) {
                    state.stepLength = 10 / state.steps;
                    addLog(`Calibrado! Passo: ${state.stepLength.toFixed(2)}m`, "#4ade80");
                    document.getElementById('btn-run').disabled = false;
                    document.getElementById('btn-run').classList.remove('opacity-50', 'bg-gray-800');
                    document.getElementById('btn-run').classList.add('bg-green-600', 'text-white');
                }
                state.mode = 'IDLE';
                btn.classList.add('hidden');
            }
        };

        document.getElementById('btn-run').onclick = () => {
            const btn = document.getElementById('btn-run');
            if (state.mode !== 'RUNNING') {
                state.mode = 'RUNNING';
                btn.textContent = "PAUSAR RASTREIO";
                btn.classList.replace('bg-green-600', 'bg-red-600');
                addLog("Rastreio Iniciado", "#4ade80");
            } else {
                state.mode = 'IDLE';
                btn.textContent = "RETOMAR";
                btn.classList.replace('bg-red-600', 'bg-green-600');
                addLog("Rastreio Pausado");
            }
        };

        document.getElementById('btn-manual').onclick = () => {
            updatePosition(state.stepLength);
            addLog("Passo simulado manualmente");
        };

        document.getElementById('btn-reset').onclick = () => location.reload();

        window.onresize = () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>
