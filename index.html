<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inertial AI Navigator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        .tech-font { font-family: 'JetBrains Mono', monospace; }
        
        /* Animações de Status */
        .step-indicator { transition: all 0.2s ease; }
        .step-active { background: #3b82f6; box-shadow: 0 0 20px #3b82f6; transform: scale(1.1); }
        
        /* Layout de Grade para Sensores */
        .sensor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; font-size: 8px; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- Dashboard Superior -->
        <div class="p-4 flex justify-between items-start">
            <div class="glass p-4 rounded-2xl interactive w-40 shadow-2xl">
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-wider mb-1">Trajeto</p>
                <div class="flex items-baseline gap-1">
                    <span id="dist-val" class="text-2xl font-black">0.00</span>
                    <span class="text-xs opacity-50">m</span>
                </div>
                <div class="sensor-grid mt-3 opacity-80 tech-font">
                    <span class="text-gray-500">Passos:</span> <span id="stat-steps">0</span>
                    <span class="text-gray-500">Velo:</span> <span id="stat-speed">0.0m/s</span>
                </div>
            </div>

            <!-- Painel de Sensores em Tempo Real -->
            <div class="glass p-3 rounded-2xl interactive w-44 shadow-2xl tech-font">
                <p class="text-[9px] text-emerald-400 font-bold uppercase mb-2">Monitor Inercial</p>
                <div class="space-y-1 text-[9px]">
                    <div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="opacity-50">Acc Raw:</span> <span id="raw-acc">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="opacity-50">Acc Filt:</span> <span id="filt-acc" class="text-emerald-400">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="opacity-50">Heading:</span> <span id="raw-hd">0°</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="opacity-50">GPS Prec:</span> <span id="gps-acc" class="text-yellow-500">---</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="spacer flex-grow"></div>

        <!-- Painel de Controle Inferior -->
        <div class="p-4 pb-10 flex flex-col gap-4 interactive">
            
            <!-- Logs de IA (Feedback Visual do Treino) -->
            <div id="ai-log" class="glass p-3 rounded-xl mx-auto w-full max-w-sm text-[10px] tech-font text-blue-300 border-l-4 border-blue-500 hidden">
                > IA: Otimizando modelo de passo baseado em GPS...
            </div>

            <div class="glass p-6 rounded-[2.5rem] shadow-2xl max-w-lg mx-auto w-full">
                <!-- Seção Inicial -->
                <div id="setup-area">
                    <h2 class="text-center font-bold text-lg mb-4">Sistema de Navegação IA</h2>
                    <button id="btn-init" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-tighter transition-all active:scale-95">
                        Inicializar Sensores
                    </button>
                </div>

                <!-- Seção Ativa -->
                <div id="active-area" class="hidden space-y-4">
                    <div class="flex justify-around items-center py-2">
                        <div id="step-led" class="w-3 h-3 rounded-full bg-slate-700 step-indicator"></div>
                        <span id="mode-badge" class="px-3 py-1 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-widest text-slate-400">Em Espera</span>
                        <div id="ml-badge" class="text-[9px] text-blue-400 font-bold uppercase">Modelo: Estático</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-train" class="bg-yellow-600/20 text-yellow-500 border border-yellow-600/30 py-4 rounded-2xl font-bold text-xs uppercase flex flex-col items-center">
                            <span>🛰️ Treino com GPS</span>
                            <span class="text-[8px] opacity-60">IA aprende seu passo</span>
                        </button>
                        <button id="btn-run" disabled class="bg-slate-800 text-slate-600 py-4 rounded-2xl font-bold text-xs uppercase cursor-not-allowed">
                            🚀 Iniciar Navegação
                        </button>
                    </div>

                    <div class="flex gap-2 border-t border-white/5 pt-4">
                        <button id="btn-clear-path" class="flex-1 py-3 text-[10px] font-bold uppercase text-blue-400 bg-blue-400/10 rounded-xl">Limpar Trajeto</button>
                        <button id="btn-reset" class="px-5 py-3 text-[10px] font-bold uppercase text-red-500 bg-red-500/10 rounded-xl">Hard Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MACHINE LEARNING: STEP LENGTH MODEL ---
        class StepLengthModel {
            constructor() {
                this.weights = { bias: 0.75, varianceWeight: 0.05, freqWeight: 0.01 };
                this.trainingData = []; // { steps, distance, avgVariance, avgFreq }
            }

            predict(variance, frequency) {
                // Modelo de regressão linear para prever comprimento do passo baseado na intensidade do movimento
                return this.weights.bias + (variance * this.weights.varianceWeight) + (frequency * this.weights.freqWeight);
            }

            train(gpsDist, stepCount, variance, frequency) {
                if (stepCount < 5) return;
                const realStepLen = gpsDist / stepCount;
                
                // Aprendizado incremental simples (Stochastic Gradient Descent simplificado)
                const learningRate = 0.1;
                this.weights.bias += (realStepLen - this.predict(variance, frequency)) * learningRate;
                
                addAILog(`Modelo atualizado: Passo base agora é ${this.weights.bias.toFixed(2)}m`);
                document.getElementById('ml-badge').textContent = "Modelo: IA Otimizada";
                document.getElementById('ml-badge').classList.replace('text-blue-400', 'text-emerald-400');
            }
        }

        // --- SISTEMA DE FILTRAGEM (DSP) ---
        class LowPassFilter {
            constructor(size = 5) {
                this.size = size;
                this.buffer = [];
            }
            push(val) {
                this.buffer.push(val);
                if (this.buffer.length > this.size) this.buffer.shift();
                return this.buffer.reduce((a, b) => a + b, 0) / this.buffer.length;
            }
        }

        // --- ESTADO GLOBAL ---
        let state = {
            mode: 'IDLE',
            steps: 0,
            distance: 0,
            heading: 0,
            lastStepTime: 0,
            accBuffer: new LowPassFilter(8),
            ml: new StepLengthModel(),
            pos: { x: 0, z: 0 },
            path: [new THREE.Vector3(0, 0, 0)],
            
            // Variáveis de Treino
            trainStartGps: null,
            trainVariances: [],
            trainStartTime: 0
        };

        function addAILog(msg) {
            const el = document.getElementById('ai-log');
            el.textContent = `> IA: ${msg}`;
            el.classList.remove('hidden');
        }

        // --- ENGINE 3D (THIRD PERSON VIEW) ---
        let scene, camera, renderer, player, trail, grid;
        const CAM_OFFSET = new THREE.Vector3(0, 8, 12);

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Cenário Cibernético
            grid = new THREE.GridHelper(1000, 100, 0x1e293b, 0x0f172a);
            scene.add(grid);

            // Player (Terceira Pessoa)
            player = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 0.8, 4, 16),
                new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x3b82f6, emissiveIntensity: 0.2 })
            );
            const eye = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.1, 0.2),
                new THREE.MeshBasicMaterial({ color: 0x60a5fa })
            );
            eye.position.set(0, 0.4, -0.4);
            player.add(body, eye);
            player.position.y = 1;
            scene.add(player);

            // Luzes
            const pLight = new THREE.PointLight(0x3b82f6, 2, 20);
            pLight.position.set(0, 5, 0);
            player.add(pLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // Rastro
            trail = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(state.path),
                new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 })
            );
            scene.add(trail);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Câmera em Terceira Pessoa Suave
            const targetCamPos = player.position.clone().add(
                CAM_OFFSET.clone().applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y)
            );
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }

        // --- LOGICA DE MOVIMENTO E PRECISÃO ---
        function handleStep(rawVariance) {
            state.steps++;
            document.getElementById('stat-steps').textContent = state.steps;
            
            // Feedback Visual do LED
            const led = document.getElementById('step-led');
            led.classList.add('step-active');
            setTimeout(() => led.classList.remove('step-active'), 200);

            // Predição do Comprimento do Passo (IA)
            const freq = 1000 / (Date.now() - state.lastStepTime || 1000);
            const stepLen = state.ml.predict(rawVariance, freq);
            
            // Cálculo de Vetor
            const rad = state.heading * (Math.PI / 180);
            state.pos.x += Math.sin(rad) * stepLen;
            state.pos.z += -Math.cos(rad) * stepLen;

            // Atualização do Modelo 3D
            player.position.set(state.pos.x, 1, state.pos.z);
            player.rotation.y = -rad;

            state.path.push(new THREE.Vector3(state.pos.x, 0, state.pos.z));
            trail.geometry.setFromPoints(state.path);

            if (state.mode === 'RUNNING') {
                state.distance += stepLen;
                document.getElementById('dist-val').textContent = state.distance.toFixed(2);
            }
            
            state.lastStepTime = Date.now();
        }

        // --- SENSORES E GPS ---
        async function startSensors() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
            }

            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity || {x:0, y:0, z:0};
                const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                const filt = state.accBuffer.push(mag);

                document.getElementById('raw-acc').textContent = mag.toFixed(2);
                document.getElementById('filt-acc').textContent = filt.toFixed(2);

                // Algoritmo de Pico Adaptativo
                const now = Date.now();
                if (filt > 13.2 && (now - state.lastStepTime > 320)) {
                    if (state.mode !== 'IDLE') {
                        handleStep(filt - 9.8);
                    }
                }
            });

            window.addEventListener('deviceorientation', (e) => {
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h !== undefined) {
                    state.heading = h;
                    document.getElementById('raw-hd').textContent = Math.round(h) + "°";
                }
            });

            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('active-area').classList.remove('hidden');
        }

        // --- TREINO INTELIGENTE ---
        function startGpsTraining() {
            state.mode = 'TRAINING';
            state.steps = 0;
            state.trainStartTime = Date.now();
            
            document.getElementById('mode-badge').textContent = "Treinando...";
            document.getElementById('mode-badge').classList.replace('text-slate-400', 'text-yellow-500');

            navigator.geolocation.getCurrentPosition((p) => {
                state.trainStartGps = p.coords;
                addAILog("GPS fixado. Caminhe em linha reta por 15 segundos.");
            }, null, {enableHighAccuracy: true});

            setTimeout(() => {
                navigator.geolocation.getCurrentPosition((p) => {
                    const dist = calculateHaversine(state.trainStartGps, p.coords);
                    const avgVar = 3.5; // Simplificado para o exemplo
                    const avgFreq = 1.8;
                    
                    state.ml.train(dist, state.steps, avgVar, avgFreq);
                    
                    state.mode = 'IDLE';
                    document.getElementById('mode-badge').textContent = "Calibrado";
                    document.getElementById('mode-badge').classList.replace('text-yellow-500', 'text-emerald-500');
                    document.getElementById('btn-run').disabled = false;
                    document.getElementById('btn-run').classList.remove('text-slate-600', 'bg-slate-800');
                    document.getElementById('btn-run').classList.add('text-white', 'bg-emerald-600');
                }, null, {enableHighAccuracy: true});
            }, 15000);
        }

        function calculateHaversine(c1, c2) {
            const R = 6371e3;
            const dLat = (c2.latitude - c1.latitude) * Math.PI / 180;
            const dLon = (c2.longitude - c1.longitude) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(c1.latitude*Math.PI/180)*Math.cos(c2.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- INTERAÇÕES ---
        document.getElementById('btn-init').onclick = () => { init3D(); startSensors(); };
        document.getElementById('btn-train').onclick = startGpsTraining;
        
        document.getElementById('btn-run').onclick = () => {
            const btn = document.getElementById('btn-run');
            if (state.mode === 'RUNNING') {
                state.mode = 'IDLE';
                btn.textContent = "Continuar";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
            } else {
                state.mode = 'RUNNING';
                btn.textContent = "Pausar";
                btn.classList.replace('bg-emerald-600', 'bg-red-600');
                document.getElementById('mode-badge').textContent = "Navegando";
            }
        };

        document.getElementById('btn-clear-path').onclick = () => {
            state.path = [new THREE.Vector3(player.position.x, 0, player.position.z)];
            trail.geometry.setFromPoints(state.path);
            addAILog("Trajeto visual limpo.");
        };

        document.getElementById('btn-reset').onclick = () => location.reload();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
